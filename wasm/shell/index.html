<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Aleph One (WebAssembly)</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #000; color: #9fb4a0;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  #wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; gap: 16px;
  }
  canvas {
    image-rendering: pixelated;
    outline: none;
  }
  #status { font-size: 14px; letter-spacing: 0.08em; }
  #bar {
    width: 320px; height: 6px; background: #10201a;
    border: 1px solid #2c4a3c; display: none;
  }
  #bar > div { height: 100%; width: 0%; background: #4be08a; }
  #boot.hidden, #bar.hidden, #status.hidden { display: none; }
</style>
</head>
<body>
<div id="wrap">
  <div id="boot">
    <div id="status">STANDBY</div>
    <div id="bar"><div id="barfill"></div></div>
  </div>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
</div>
<script src="alephone.js"></script>
<script>
  // Scenario data (staged under gamedata/<slug>/ by the build) is picked
  // with ?scenario=marathon|marathon2|infinity; default Marathon Infinity.
  const SCENARIOS = {
    marathon:  'Marathon',
    marathon2: 'Marathon 2: Durandal',
    infinity:  'Marathon Infinity',
  };
  const params = new URLSearchParams(location.search);
  const scenario = SCENARIOS[params.get('scenario')] ? params.get('scenario')
                                                     : 'infinity';
  document.title = SCENARIOS[scenario] + ' — Aleph One (WebAssembly)';

  const statusEl = document.getElementById('status');
  const bar = document.getElementById('bar');
  const barfill = document.getElementById('barfill');

  const PERSIST_DIR = '/home/web_user/.alephone';
  const GAME_DIR = '/data/game';
  const DEFAULT_RELAY_URL = 'wss://balephone-relay.onrender.com';
  const DEFAULT_RELAY_HTTP_URL = 'https://balephone-relay.onrender.com';

  function setStatus(text, frac) {
    statusEl.textContent = text.toUpperCase();
    if (frac !== undefined) {
      bar.style.display = 'block';
      barfill.style.width = (100 * frac) + '%';
    }
  }

  // Scale the canvas to fill the window (letterboxed) regardless of the
  // engine's render resolution. SDL's emscripten driver rescales mouse
  // coordinates by the element's CSS size, so input stays accurate.
  const canvasEl = document.getElementById('canvas');
  function fitCanvas() {
    const rw = canvasEl.width, rh = canvasEl.height;
    if (!rw || !rh) return;
    const scale = Math.min(window.innerWidth / rw, window.innerHeight / rh);
    canvasEl.style.width = Math.round(rw * scale) + 'px';
    canvasEl.style.height = Math.round(rh * scale) + 'px';
  }
  new MutationObserver(fitCanvas).observe(canvasEl, {
    attributes: true, attributeFilter: ['width', 'height'],
  });
  window.addEventListener('resize', fitCanvas);

  // Download the scenario's files (manifest + contents) with progress.
  async function fetchGameData(slug, onProgress) {
    const base = 'gamedata/' + slug + '/';
    const manifest = await (await fetch(base + 'manifest.json')).json();
    let loaded = 0;
    return Promise.all(manifest.files.map(async (f) => {
      const res = await fetch(base + f.path);
      if (!res.ok) throw new Error('fetch failed: ' + f.path);
      const reader = res.body.getReader();
      const chunks = [];
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        loaded += value.length;
        onProgress(loaded / manifest.total);
      }
      const data = new Uint8Array(f.size);
      let pos = 0;
      for (const c of chunks) { data.set(c, pos); pos += c.length; }
      return { path: f.path, data };
    }));
  }

  setStatus('fetching game data', 0);

  // Game data downloads while the browser fetches/compiles the engine.
  const gameData = fetchGameData(scenario,
    (frac) => setStatus('fetching game data', frac));

  AlephOne({
    canvas: canvasEl,
    arguments: [GAME_DIR],
    // Multiplayer relay. Override with ?relay=wss://host:port if needed.
    relayUrl: params.get('relay') || DEFAULT_RELAY_URL,
    relayHttpUrl: params.get('relay_http') || DEFAULT_RELAY_HTTP_URL,
    print(text) { console.log(text); },
    printErr(text) { console.warn(text); },
  }).then(async (Module) => {
    window.__module = Module; // console/testing access

    // Unpack the downloaded scenario into the virtual filesystem.
    const files = await gameData;
    for (const f of files) {
      const dir = GAME_DIR + '/' + f.path.split('/').slice(0, -1).join('/');
      Module.FS.mkdirTree(dir);
      Module.FS.writeFile(GAME_DIR + '/' + f.path, f.data);
    }

    // Persist prefs + saved games in IndexedDB, then start the game.
    Module.FS.mkdirTree(PERSIST_DIR);
    Module.FS.mount(Module.FS.filesystems.IDBFS, {}, PERSIST_DIR);
    Module.FS.syncfs(true, (err) => {
      if (err) console.warn('IDBFS load failed:', err);

      // Flush writes back to IndexedDB periodically and when leaving.
      const persist = () => Module.FS.syncfs(false, (e) => {
        if (e) console.warn('IDBFS save failed:', e);
      });
      setInterval(persist, 10000);
      window.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'hidden') persist();
      });

      document.getElementById('boot').classList.add('hidden');
      Module.callMain([GAME_DIR]);
    });
  }).catch((e) => {
    setStatus('boot failed: ' + e.message);
    console.error(e);
  });
</script>
</body>
</html>
